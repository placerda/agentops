# AgentOps Toolkit — Cut Release
#
# Workflows:
#   1. ci.yml          — Lint + test on every push/PR; VSIX build validation
#   2. _build.yml      — Reusable build (test + package), called by staging and release
#   3. staging.yml     — Staging: release/* → TestPyPI → verify; VSIX pre-release → Marketplace
#   4. release.yml     — Production: v* tag → TestPyPI → verify → PyPI → GH Release; VSIX stable → Marketplace
#   5. cut-release.yml — Manual dispatch: create release branch + PR from develop
#
# One-click release branch creation. Triggered manually from the Actions tab.
# Creates a release branch from develop, updates CHANGELOG.md, syncs the
# VS Code extension version in package.json, and opens a PR to main.
# The branch push then triggers staging.yml automatically.
#
# Required GitHub secrets:
#   RELEASE_PAT — A Personal Access Token (classic or fine-grained) with `repo` scope.
#                 Needed because the org policy blocks GITHUB_TOKEN from creating PRs.
#                 Setup: Settings → Secrets → Actions → New secret → Name: RELEASE_PAT
#
# Usage:
#   Actions tab → "Cut Release" → "Run workflow" → enter version (e.g. 0.2.0)

name: Cut Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0) — no 'v' prefix"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  cut-release:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must be in semver format (e.g. 0.2.0), got: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_ENV"

      - name: Checkout develop
        uses: actions/checkout@v6
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Check release branch does not exist
        run: |
          if git ls-remote --exit-code origin "refs/heads/release/v${{ env.version }}" >/dev/null 2>&1; then
            echo "::error::Branch release/v${{ env.version }} already exists. Delete it first or use a different version."
            exit 1
          fi

      - name: Create release branch
        run: |
          git checkout -b "release/v${{ env.version }}"

      - name: Update CHANGELOG
        run: |
          DATE=$(date +%Y-%m-%d)
          if grep -q "## \[${{ env.version }}\]" CHANGELOG.md; then
            echo "CHANGELOG already has [${{ env.version }}] entry — skipping insertion"
            exit 0
          fi
          VERSION="${{ env.version }}" DATE="$DATE" python - <<'PY'
          import os
          import sys
          from pathlib import Path

          path = Path("CHANGELOG.md")
          text = path.read_text(encoding="utf-8")
          marker = "## [Unreleased]"
          version = os.environ["VERSION"]
          date = os.environ["DATE"]
          if marker not in text:
              print("::error::CHANGELOG.md is missing the ## [Unreleased] section.")
              sys.exit(1)
          replacement = f"{marker}\n\n## [{version}] - {date}"
          path.write_text(text.replace(marker, replacement, 1), encoding="utf-8")
          PY
          echo "CHANGELOG updated with [${{ env.version }}] - $DATE"

      - name: Sync plugin versions
        run: |
          VERSION="${{ env.version }}"

          # package.json (VSIX)
          jq --arg v "$VERSION" '.version = $v' \
            plugins/agentops/package.json > plugins/agentops/package.json.tmp
          mv plugins/agentops/package.json.tmp plugins/agentops/package.json
          echo "package.json  → $VERSION"

          # plugin.json (Agent Plugins)
          jq --arg v "$VERSION" '.version = $v' \
            plugins/agentops/plugin.json > plugins/agentops/plugin.json.tmp
          mv plugins/agentops/plugin.json.tmp plugins/agentops/plugin.json
          echo "plugin.json   → $VERSION"

          # marketplace.json (GitHub + Claude Code)
          for mp in .github/plugin/marketplace.json .claude-plugin/marketplace.json; do
            jq --arg v "$VERSION" '.plugins[0].version = $v' "$mp" > "$mp.tmp"
            mv "$mp.tmp" "$mp"
            echo "$mp → $VERSION"
          done

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        run: |
          git add CHANGELOG.md plugins/agentops/package.json plugins/agentops/plugin.json .github/plugin/marketplace.json .claude-plugin/marketplace.json
          git commit -m "chore: prepare release ${{ env.version }}"
          git push origin "release/v${{ env.version }}"

      - name: Create PR to main
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          gh pr create \
            --base main \
            --head "release/v${{ env.version }}" \
            --title "Release v${{ env.version }}" \
            --body "## Release v${{ env.version }}

          Automated release branch created from \`develop\`.

          ### What happened
          - Branch \`release/v${{ env.version }}\` created from \`develop\`
          - \`CHANGELOG.md\` updated: versioned section \`[${{ env.version }}]\` added
          - Plugin versions synced to \`${{ env.version }}\` (package.json, plugin.json, marketplace.json)
          - Staging pipeline triggered automatically (build → TestPyPI + VSIX pre-release → verify)

          ### Next steps
          1. Wait for the **Staging** pipeline to pass
          2. Review and approve this PR
          3. Merge to \`main\`
          4. Tag and push: \`git tag v${{ env.version }} && git push origin v${{ env.version }}\`
          5. Approve the PyPI publish and VSIX stable publish in the **Release** workflow
          6. Sync develop: \`git checkout develop && git merge main && git push origin develop\`

          ### Checklist
          - [ ] Staging pipeline passes (build + TestPyPI + VSIX pre-release + verify)
          - [ ] CHANGELOG entries reviewed
          - [ ] PR approved and merged to main
          - [ ] Tag \`v${{ env.version }}\` pushed
          - [ ] PyPI publish approved
          - [ ] VSIX stable publish approved
          - [ ] develop synced from main"

      - name: Summary
        run: |
          echo "## ✅ Release branch created" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: \`release/v${{ env.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- CHANGELOG updated with version **${{ env.version }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Plugin versions synced to **${{ env.version }}** (package.json, plugin.json, marketplace.json)" >> "$GITHUB_STEP_SUMMARY"
          echo "- PR opened: \`release/v${{ env.version }}\` → \`main\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Staging pipeline triggered automatically" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Next: wait for staging, then tag \`v${{ env.version }}\` to publish" >> "$GITHUB_STEP_SUMMARY"
